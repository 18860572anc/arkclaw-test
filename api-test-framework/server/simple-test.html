<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>简单测试</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .btn { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; }
    .result { margin-top: 20px; padding: 10px; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h1>简单测试页面</h1>
  <button class="btn">点击测试</button>
  <div class="result" id="result"></div>

  <script>
    console.log('脚本已加载');
    
    // 使用事件委托绑定点击事件
    document.body.addEventListener('click', function(e) {
      const btn = e.target.closest('.btn');
      if (btn) {
        console.log('按钮被点击');
        const result = document.getElementById('result');
        result.innerHTML = '正在请求...';
        
        fetch('/health')
          .then(res => res.json())
          .then(data => {
            result.innerHTML = '成功: ' + JSON.stringify(data);
          })
          .catch(err => {
            result.innerHTML = '失败: ' + err.message;
          });
      }
    });
  </script>
</body>
</html>
